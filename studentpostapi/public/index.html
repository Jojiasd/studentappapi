<!DOCTYPE html>
<html>
<head>
  <title>Student Post API</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>📚 Student Post System (Blob Storage)</h1>

    <form class="form" onsubmit="addStudent(); return false;">
      <input id="name" placeholder="Student Name" required>
      <input id="post" placeholder="Student Post" required>
      <button type="submit">POST</button>
    </form>

    <h2>All Posts</h2>
    <div id="list"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
